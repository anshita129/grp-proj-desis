<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Market Simulation</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: white;
            padding: 2rem;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #1e293b;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #38bdf8;
            margin-top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            font-size: 0.9rem;
            padding: 0.3rem 0.8rem;
            border-radius: 9999px;
            background: #475569;
            color: #f8fafc;
        }

        .status-badge.live {
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }

            100% {
                opacity: 1;
            }
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .card {
            background: #334155;
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
            border-left: 4px solid #475569;
        }

        .card.nav-card {
            border-left-color: #38bdf8;
        }

        .card.cash-card {
            border-left-color: #10b981;
        }

        .title {
            font-size: 0.9rem;
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .value {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            margin-top: 0.5rem;
            font-variant-numeric: tabular-nums;
        }

        .market-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .ticker-card {
            background: #0f172a;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .ticker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .ticker-symbol {
            font-size: 1.5rem;
            font-weight: bold;
            color: #f8fafc;
        }

        .ticker-price {
            font-size: 1.8rem;
            font-weight: bold;
            color: #10b981;
            font-variant-numeric: tabular-nums;
        }

        .ticker-price.down {
            color: #ef4444;
        }

        .trade-controls {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        input[type="number"] {
            flex: 1;
            padding: 0.75rem;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #1e293b;
            color: white;
            font-size: 1rem;
        }

        button {
            border: none;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-buy {
            background: #10b981;
            color: white;
        }

        .btn-buy:hover:not(:disabled) {
            background: #059669;
        }

        .btn-sell {
            background: #ef4444;
            color: white;
        }

        .btn-sell:hover:not(:disabled) {
            background: #dc2626;
        }

        .main-controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .btn-start {
            background: #3b82f6;
            color: white;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            border-radius: 8px;
        }

        .btn-start:hover:not(:disabled) {
            background: #2563eb;
        }

        .btn-stop {
            background: #f59e0b;
            color: white;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            border-radius: 8px;
            display: none;
        }

        .time-display {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: #94a3b8;
            font-family: monospace;
        }

        .log-panel {
            background: #000;
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            height: 150px;
            overflow-y: auto;
            color: #a3e635;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>
            Real-Time Market Simulator
            <span class="status-badge" id="sim-status">Offline</span>
        </h1>

        <div class="time-display" id="current-time">YYYY-MM-DD HH:MM</div>

        <div class="dashboard">
            <div class="card nav-card">
                <div class="title">Net Asset Value</div>
                <div class="value" id="nav">$10,000.00</div>
            </div>
            <div class="card cash-card">
                <div class="title">Available Cash</div>
                <div class="value" id="cash">$10,000.00</div>
            </div>
        </div>

        <div class="main-controls">
            <button class="btn-start" onclick="startSim()" id="btn-start">▶ Start Simulation Pipeline</button>
            <button class="btn-stop" onclick="stopSim()" id="btn-stop">⏸ Pause Simulation</button>
        </div>

        <div class="market-panel">
            <!-- Dynamically populated via initUI() -->
        </div>

        <div class="log-panel" id="log">System initialized. Waiting for data feed...</div>
    </div>

    <script>
        const MARKET_DATA_URL = "http://127.0.0.1:8003/api/simulation/market-data/";

        // Core Engine State
        let marketData = [];
        let currentTick = 0;
        let simInterval = null;
        let isRunning = false;
        let uniqueSymbols = [];

        // Portfolio State
        let portfolio = {
            cash: 10000.00,
            positions: {} // Dynamic
        };

        // Current Market Prices
        let currentPrices = {};
        let prevPrices = {};

        function logMessage(msg) {
            const logPanel = document.getElementById("log");
            const time = new Date().toLocaleTimeString();
            const el = document.createElement("div");
            el.innerText = `[${time}] ${msg}`;
            logPanel.appendChild(el);
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function initUI() {
            // First, populate State for symbols
            uniqueSymbols.forEach(sym => {
                portfolio.positions[sym] = 0;
                currentPrices[sym] = 0;
                prevPrices[sym] = 0;
            });

            // Build Dashboard Share Cards
            const dash = document.querySelector(".dashboard");
            // clear old shares
            Array.from(dash.children).filter(c => !c.classList.contains("nav-card") && !c.classList.contains("cash-card")).forEach(c => c.remove());

            uniqueSymbols.forEach(sym => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `<div class="title">${sym} Shares</div><div class="value" id="shares-${sym.toLowerCase()}">0</div>`;
                dash.appendChild(card);
            });

            // Build Market Panel Cards
            const panel = document.querySelector(".market-panel");
            panel.innerHTML = "";
            uniqueSymbols.forEach(sym => {
                const cs = sym.toLowerCase();
                const cardHtml = `
                    <div class="ticker-card">
                        <div class="ticker-header">
                            <div class="ticker-symbol">${sym}</div>
                            <div class="ticker-price" id="price-${cs}">$0.00</div>
                        </div>
                        <div>Owned: <span id="owned-${cs}">0</span> | Value: <span id="value-${cs}">$0.00</span></div>
                        <div class="trade-controls">
                            <input type="number" id="qty-${cs}" value="10" min="1">
                            <button class="btn-buy" onclick="trade('Buy', '${sym}')" id="buy-${cs}" disabled>Buy</button>
                            <button class="btn-sell" onclick="trade('Sell', '${sym}')" id="sell-${cs}" disabled>Sell</button>
                        </div>
                    </div>
                `;
                panel.innerHTML += cardHtml;
            });
        }

        async function fetchMarketData() {
            try {
                logMessage("Fetching market data feed...");
                const res = await fetch(MARKET_DATA_URL);
                const data = await res.json();
                if (data.error) {
                    logMessage(`ERROR: ${data.error}`);
                    return false;
                }

                // Group data by timestamp since CSV has multiple symbols
                let groupedByTime = {};
                let times = [];
                let symbolSet = new Set();
                data.data.forEach(row => {
                    let ts = row.timestamp || row.Date;
                    if (!groupedByTime[ts]) {
                        groupedByTime[ts] = {};
                        times.push(ts);
                    }
                    let sym = (row.symbol || row.Symbol).toUpperCase();
                    symbolSet.add(sym);
                    groupedByTime[ts][sym] = parseFloat(row.close || row.Close);
                });

                marketData = times.map(ts => ({ timestamp: ts, prices: groupedByTime[ts] }));
                uniqueSymbols = Array.from(symbolSet).sort();

                logMessage(`Received ${marketData.length} unique market time ticks for ${uniqueSymbols.length} symbols.`);
                initUI();
                return true;
            } catch (e) {
                logMessage(`Network Error: Make sure the Django API is running on port 8003.`);
                console.error(e);
                return false;
            }
        }

        function updateUI() {
            if (currentTick >= marketData.length) return;

            const tick = marketData[currentTick];
            document.getElementById("current-time").innerText = tick.timestamp || `Tick ${currentTick}`;

            // Update Prices for specific symbols
            uniqueSymbols.forEach(sym => {
                if (tick.prices[sym] !== undefined) {
                    prevPrices[sym] = currentPrices[sym];
                    currentPrices[sym] = tick.prices[sym];
                    updateTickerUI(sym);
                }
            });

            // Calculate NAV
            let positionsValue = 0;
            uniqueSymbols.forEach(sym => {
                positionsValue += portfolio.positions[sym] * currentPrices[sym];
            });
            let nav = portfolio.cash + positionsValue;

            // Update Dashboard
            document.getElementById("nav").innerText = `$${nav.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            document.getElementById("cash").innerText = `$${portfolio.cash.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

            uniqueSymbols.forEach(sym => {
                const cs = sym.toLowerCase();
                document.getElementById(`shares-${cs}`).innerText = portfolio.positions[sym];
                document.getElementById(`owned-${cs}`).innerText = portfolio.positions[sym];
                document.getElementById(`value-${cs}`).innerText = `$${(portfolio.positions[sym] * currentPrices[sym]).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            });
        }

        function updateTickerUI(symbol) {
            const priceEl = document.getElementById(`price-${symbol.toLowerCase()}`);
            const current = currentPrices[symbol];
            const prev = prevPrices[symbol];

            priceEl.innerText = `$${current.toFixed(2)}`;

            if (current < prev) {
                priceEl.classList.add("down");
            } else {
                priceEl.classList.remove("down");
            }
        }

        function engineTick() {
            if (currentTick >= marketData.length - 1) {
                stopSim();
                logMessage("End of market data reached.");
                document.getElementById("sim-status").innerText = "Completed";
                document.getElementById("sim-status").classList.remove("live");
                return;
            }

            currentTick++;
            updateUI();
        }

        async function startSim() {
            if (marketData.length === 0) {
                const success = await fetchMarketData();
                if (!success) return;
                // Initialize first tick
                updateUI();
            }

            if (currentTick >= marketData.length - 1) {
                logMessage("Simulation already at the end of data. Refresh page to restart.");
                return;
            }

            logMessage("Starting High-Frequency Engine...");
            isRunning = true;

            // UI Updates
            document.getElementById("btn-start").style.display = "none";
            document.getElementById("btn-stop").style.display = "block";
            document.getElementById("sim-status").innerText = "LIVE STREAM";
            document.getElementById("sim-status").classList.add("live");

            // Enable buttons
            uniqueSymbols.forEach(sym => {
                const cs = sym.toLowerCase();
                document.getElementById(`buy-${cs}`).disabled = false;
                document.getElementById(`sell-${cs}`).disabled = false;
            });

            // Start Interval (100ms per tick is extremely fast "nanosecond-like" feeling to humans)
            simInterval = setInterval(engineTick, 100);
        }

        function stopSim() {
            clearInterval(simInterval);
            isRunning = false;

            // UI Updates
            document.getElementById("btn-start").style.display = "block";
            document.getElementById("btn-start").innerText = "Resume Simulation";
            document.getElementById("btn-stop").style.display = "none";
            document.getElementById("sim-status").innerText = "Paused";
            document.getElementById("sim-status").classList.remove("live");

            // Disable buttons to prevent trading while paused
            uniqueSymbols.forEach(sym => {
                const cs = sym.toLowerCase();
                document.getElementById(`buy-${cs}`).disabled = true;
                document.getElementById(`sell-${cs}`).disabled = true;
            });

            logMessage("Simulation Paused.");
        }

        function trade(side, symbol) {
            const qtyStr = document.getElementById(`qty-${symbol.toLowerCase()}`).value;
            const qty = parseInt(qtyStr, 10);

            if (isNaN(qty) || qty <= 0) {
                logMessage(`Invalid quantity: ${qtyStr}`);
                return;
            }

            const price = currentPrices[symbol];
            const cost = qty * price;

            if (side === 'Buy') {
                if (portfolio.cash < cost) {
                    logMessage(`[DECLINED] Insufficient cash for ${qty}x ${symbol} @ $${price.toFixed(2)}. Need $${cost.toFixed(2)}`);
                    return;
                }
                portfolio.cash -= cost;
                portfolio.positions[symbol] += qty;
                logMessage(`[FILLED] BUY ${qty} ${symbol} @ $${price.toFixed(2)} (-$${cost.toFixed(2)})`);
            } else if (side === 'Sell') {
                if (portfolio.positions[symbol] < qty) {
                    logMessage(`[DECLINED] Insufficient shares. Own ${portfolio.positions[symbol]}x ${symbol}, tried to sell ${qty}.`);
                    return;
                }
                portfolio.cash += cost;
                portfolio.positions[symbol] -= qty;
                logMessage(`[FILLED] SELL ${qty} ${symbol} @ $${price.toFixed(2)} (+$${cost.toFixed(2)})`);
            }

            // Force an immediate UI update so trades reflect instantly
            updateUI();
        }

        // Initial fetch on page load just to get ready
        window.onload = async () => {
            logMessage("Engine initializing. Downloading data payload...");
            document.getElementById("btn-start").disabled = true;
            document.getElementById("btn-start").innerText = "Loading Data...";

            await fetchMarketData();

            document.getElementById("btn-start").disabled = false;
            document.getElementById("btn-start").innerText = "▶ Start Simulation Pipeline";
            logMessage("Engine ready. Press Start to begin stream.");
        };
    </script>

</body>

</html>
